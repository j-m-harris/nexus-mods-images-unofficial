<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Mods Image Browser</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 2px solid #d35400;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header h1 {
            font-size: 1.4rem;
            color: #d35400;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .control-group label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #e0e0e0;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #d35400;
        }

        input[type="text"] { width: 200px; }
        input[type="number"] { width: 80px; }

        .game-picker {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .game-picker input {
            width: 240px;
        }

        .game-picker select {
            width: 240px;
            max-height: 160px;
        }

        button {
            background: #d35400;
            color: #fff;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #e67e22; }
        button:disabled { background: #555; cursor: not-allowed; }

        .status-bar {
            padding: 0.5rem 2rem;
            font-size: 0.85rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            padding: 1rem 2rem 2rem;
        }

        .card {
            background: #16213e;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: #0f0f23;
        }

        .card-body {
            padding: 0.75rem;
        }

        .card-title {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.35rem;
        }

        .card-meta {
            font-size: 0.75rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-game {
            color: #d35400;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .card-stats {
            display: flex;
            gap: 0.75rem;
        }

        .facets-bar {
            padding: 0;
        }

        .facets-bar:empty {
            display: none;
        }

        .facet-group {
            padding: 0.5rem 2rem;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .facet-group-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
            min-width: 70px;
        }

        .facet-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }

        .facet-btn {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #ccc;
            padding: 0.25rem 0.6rem;
            border-radius: 3px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .facet-btn:hover {
            border-color: #d35400;
            color: #fff;
        }

        .facet-btn.active {
            background: #d35400;
            border-color: #d35400;
            color: #fff;
        }

        .facet-btn .facet-count {
            color: #888;
            font-size: 0.65rem;
            margin-left: 0.25rem;
        }

        .facet-btn.active .facet-count {
            color: rgba(255, 255, 255, 0.7);
        }

        .card-link {
            display: block;
            margin-top: 0.4rem;
            font-size: 0.75rem;
            color: #d35400;
            text-decoration: none;
        }

        .card-link:hover {
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem 2rem;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-info {
            color: #ccc;
            text-align: center;
            font-size: 0.9rem;
        }

        .lightbox-info a {
            color: #d35400;
            text-decoration: none;
        }

        .lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .spinner {
            display: none;
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a4a;
            border-top-color: #d35400;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 3rem auto;
        }

        .spinner.active { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            color: #e74c3c;
            padding: 1rem 2rem;
            text-align: center;
        }

        .scroll-sentinel {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem 2rem 2rem;
            color: #888;
            font-size: 0.85rem;
        }

        .scroll-sentinel.active { display: flex; }

        .spinner-inline {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #2a2a4a;
            border-top-color: #d35400;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        .spinner-inline.active { display: block; }
    </style>
</head>
<body>
    <header>
        <h1>Nexus Mods Image Browser</h1>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>Search</label>
            <input type="text" id="searchInput" placeholder="Search images...">
        </div>
        <div class="control-group">
            <label>Game</label>
            <div class="game-picker">
                <input type="text" id="gameFilter" placeholder="Type to filter games..." autocomplete="off">
                <select id="gameSelect">
                    <option value="">All Games</option>
                </select>
            </div>
        </div>
        <div class="control-group">
            <label>Sort By</label>
            <select id="sortSelect">
                <option value="createdAt">Newest</option>
                <option value="createdAt-ASC">Oldest</option>
                <option value="views">Most Viewed</option>
                <option value="rating">Top Rated</option>
                <option value="random">Random</option>
            </select>
        </div>
        <div class="control-group">
            <label>Per Page</label>
            <input type="number" id="countInput" value="20" min="1" max="50">
        </div>
        <div class="control-group">
            <label>Mode</label>
            <select id="modeSelect">
                <option value="paginated">Paginated</option>
                <option value="infinite" selected>Infinite Scroll</option>
            </select>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="searchBtn">Search</button>
        </div>
    </div>

    <div id="facetsBar" class="facets-bar"></div>

    <div class="status-bar">
        <span id="statusText"></span>
        <span id="totalText"></span>
    </div>

    <div class="spinner" id="spinner"></div>
    <div class="error" id="errorMsg"></div>
    <div class="grid" id="grid"></div>

    <div class="pagination" id="pagination"></div>

    <div id="scrollSentinel" class="scroll-sentinel">
        <div class="spinner-inline" id="infiniteSpinner"></div>
        <span id="infiniteStatus"></span>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-info" id="lightboxInfo"></div>
    </div>

    <script>
        const API_URL = 'https://api.nexusmods.com/v2/graphql';
        const GAMES_URL = 'https://data.nexusmods.com/file/nexus-data/games.json';
        let currentOffset = 0;
        let totalResults = 0;
        let infiniteLoading = false;
        let infiniteObserver = null;
        let allGames = [];
        let activeFacets = {};  // e.g. { gameId: "110", category: "Mods" }
        let lastFacets = [];    // raw facet results from last query

        async function loadGames() {
            try {
                const res = await fetch(GAMES_URL);
                if (!res.ok) throw new Error(`Failed to load games: ${res.status}`);
                allGames = await res.json();
                allGames.sort((a, b) => a.name.localeCompare(b.name));
                populateGameSelect(allGames);
            } catch (err) {
                console.error('Failed to load games list:', err);
            }
        }

        function populateGameSelect(games) {
            const select = document.getElementById('gameSelect');
            const currentValue = select.value;
            select.innerHTML = '<option value="">All Games</option>';
            for (const g of games) {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = g.name;
                if (g.domain_name === currentValue) opt.selected = true;
                select.appendChild(opt);
            }
        }

        function filterGameList() {
            const select = document.getElementById('gameSelect');
            const query = document.getElementById('gameFilter').value.toLowerCase().trim();
            if (!query) {
                populateGameSelect(allGames);
                select.value = '';
                return;
            }
            const filtered = allGames.filter(g =>
                g.name.toLowerCase().includes(query) ||
                g.domain_name.toLowerCase().includes(query)
            );
            populateGameSelect(filtered);
            // Auto-select the first matching game
            if (filtered.length > 0) {
                select.value = String(filtered[0].id);
            }
        }

        const QUERY = `
            query MediaSearch(
                $facets: MediaFacet,
                $filter: MediaSearchFilter,
                $sort: [MediaSearchSort!],
                $offset: Int,
                $count: Int
            ) {
                media(
                    facets: $facets,
                    filter: $filter,
                    sort: $sort,
                    offset: $offset,
                    count: $count
                ) {
                    totalCount
                    facets { facet value count }
                    nodes {
                        ... on Image {
                            id
                            name
                            caption
                            description
                            url
                            thumbnailUrl
                            views
                            rating
                            createdAt
                            siteUrl
                            category { name }
                            game {
                                name
                                domainName
                            }
                            owner {
                                name
                                avatar
                                memberId
                            }
                        }
                    }
                }
            }
        `;

        function isInfiniteMode() {
            return document.getElementById('modeSelect').value === 'infinite';
        }

        function getPerPage() {
            return parseInt(document.getElementById('countInput').value) || 20;
        }

        function buildVariables(offset) {
            const search = document.getElementById('searchInput').value.trim();
            const game = document.getElementById('gameSelect').value;
            const sortVal = document.getElementById('sortSelect').value;
            const count = getPerPage();

            const filter = {
                type: [{ value: 'image', op: 'EQUALS' }]
            };

            if (game) {
                filter.gameId = [{ value: game, op: 'EQUALS' }];
            }

            if (search) {
                filter.generalSearch = [{ value: search, op: 'EQUALS' }];
            }

            // Apply active facet selections as filters
            if (activeFacets.gameId && !game) {
                filter.gameId = [{ value: activeFacets.gameId, op: 'EQUALS' }];
            }
            // category can't be filtered server-side, but gameId can

            let sort;
            if (sortVal === 'random') {
                sort = [{ random: { seed: Math.floor(Math.random() * 100000) } }];
            } else {
                const [field, dir] = sortVal.includes('-')
                    ? sortVal.split('-')
                    : [sortVal, 'DESC'];
                sort = [{ [field]: { direction: dir } }];
            }

            const facets = { gameId: [], category: [] };

            return { facets, filter, sort, offset, count };
        }

        async function doFetch(offset, includeFacets = false) {
            const variables = buildVariables(offset);
            if (!includeFacets) {
                delete variables.facets;
            }
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: QUERY, variables })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

            const json = await res.json();

            if (json.errors) {
                throw new Error(json.errors.map(e => e.message).join('; '));
            }

            const result = json.data.media;
            if (includeFacets && result.facets) {
                lastFacets = result.facets;
                renderFacets();
            }
            return result;
        }

        // --- Paginated mode ---

        async function fetchImages() {
            const grid = document.getElementById('grid');
            const spinner = document.getElementById('spinner');
            const errorMsg = document.getElementById('errorMsg');
            const statusText = document.getElementById('statusText');
            const totalText = document.getElementById('totalText');

            grid.innerHTML = '';
            errorMsg.textContent = '';
            spinner.classList.add('active');
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('pagination').innerHTML = '';
            hideScrollSentinel();

            try {
                const { totalCount, nodes } = await doFetch(currentOffset, true);
                totalResults = totalCount;

                totalText.textContent = `${totalCount.toLocaleString()} total images`;
                statusText.textContent = `Showing ${currentOffset + 1}\u2013${Math.min(currentOffset + nodes.length, totalCount)} of ${totalCount.toLocaleString()}`;

                renderCards(nodes, false);
                renderPagination(totalCount, getPerPage());
            } catch (err) {
                errorMsg.textContent = `Error: ${err.message}`;
                statusText.textContent = '';
                totalText.textContent = '';
            } finally {
                spinner.classList.remove('active');
                document.getElementById('searchBtn').disabled = false;
            }
        }

        // --- Infinite scroll mode ---

        async function fetchInfiniteInitial() {
            const grid = document.getElementById('grid');
            const spinner = document.getElementById('spinner');
            const errorMsg = document.getElementById('errorMsg');
            const statusText = document.getElementById('statusText');
            const totalText = document.getElementById('totalText');

            grid.innerHTML = '';
            errorMsg.textContent = '';
            currentOffset = 0;
            totalResults = 0;
            spinner.classList.add('active');
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('pagination').innerHTML = '';

            try {
                const { totalCount, nodes } = await doFetch(0, true);
                totalResults = totalCount;
                currentOffset = nodes.length;

                totalText.textContent = `${totalCount.toLocaleString()} total images`;
                updateInfiniteStatus();

                renderCards(nodes, false);
                setupInfiniteScroll();
            } catch (err) {
                errorMsg.textContent = `Error: ${err.message}`;
                statusText.textContent = '';
                totalText.textContent = '';
                hideScrollSentinel();
            } finally {
                spinner.classList.remove('active');
                document.getElementById('searchBtn').disabled = false;
            }
        }

        async function fetchNextPage() {
            if (infiniteLoading || currentOffset >= totalResults) return;
            infiniteLoading = true;

            const infiniteSpinner = document.getElementById('infiniteSpinner');
            infiniteSpinner.classList.add('active');

            try {
                const { totalCount, nodes } = await doFetch(currentOffset);
                totalResults = totalCount;
                currentOffset += nodes.length;

                document.getElementById('totalText').textContent = `${totalCount.toLocaleString()} total images`;
                updateInfiniteStatus();

                renderCards(nodes, true);

                if (currentOffset >= totalResults) {
                    teardownInfiniteScroll();
                    document.getElementById('infiniteStatus').textContent = 'All images loaded.';
                }
            } catch (err) {
                document.getElementById('infiniteStatus').textContent = `Error loading more: ${err.message}`;
            } finally {
                infiniteSpinner.classList.remove('active');
                infiniteLoading = false;
            }
        }

        function updateInfiniteStatus() {
            const loaded = Math.min(currentOffset, totalResults);
            document.getElementById('statusText').textContent = `Loaded ${loaded.toLocaleString()} of ${totalResults.toLocaleString()}`;
            document.getElementById('infiniteStatus').textContent =
                currentOffset < totalResults ? 'Scroll for more...' : 'All images loaded.';
        }

        function setupInfiniteScroll() {
            teardownInfiniteScroll();

            const sentinel = document.getElementById('scrollSentinel');
            sentinel.classList.add('active');

            if (currentOffset >= totalResults) {
                document.getElementById('infiniteStatus').textContent = 'All images loaded.';
                return;
            }

            infiniteObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !infiniteLoading) {
                    fetchNextPage();
                }
            }, { rootMargin: '400px' });

            infiniteObserver.observe(sentinel);
        }

        function teardownInfiniteScroll() {
            if (infiniteObserver) {
                infiniteObserver.disconnect();
                infiniteObserver = null;
            }
        }

        function hideScrollSentinel() {
            document.getElementById('scrollSentinel').classList.remove('active');
            document.getElementById('infiniteSpinner').classList.remove('active');
            document.getElementById('infiniteStatus').textContent = '';
            teardownInfiniteScroll();
        }

        // --- Shared rendering ---

        function renderCards(nodes, append) {
            const grid = document.getElementById('grid');
            if (!append) grid.innerHTML = '';

            // Client-side category filter (not available as a server filter)
            let filtered = nodes;
            if (activeFacets.category) {
                filtered = nodes.filter(img => img.category?.name === activeFacets.category);
            }

            if (filtered.length === 0 && !append) {
                grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#888;padding:2rem;">No images found.</p>';
                return;
            }

            for (const img of filtered) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${escapeHtml(img.thumbnailUrl)}"
                         alt="${escapeHtml(img.caption || img.name)}"
                         loading="lazy">
                    <div class="card-body">
                        <div class="card-game">${escapeHtml(img.game?.name || 'Unknown')}</div>
                        <div class="card-title">${escapeHtml(img.caption || img.name)}</div>
                        <div class="card-meta">
                            <span>${escapeHtml(img.owner?.name || 'Unknown')}</span>
                            <div class="card-stats">
                                <span>${img.views} views</span>
                                <span>${img.rating} rating</span>
                            </div>
                        </div>
                        ${img.siteUrl ? `<a class="card-link" href="${escapeHtml(img.siteUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View on Nexus Mods</a>` : ''}
                    </div>
                `;
                card.addEventListener('click', () => openLightbox(img));
                grid.appendChild(card);
            }
        }

        function renderPagination(total, perPage) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';

            const totalPages = Math.ceil(total / perPage);
            const currentPage = Math.floor(currentOffset / perPage);

            if (totalPages <= 1) return;

            const addBtn = (label, offset, disabled = false) => {
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.disabled = disabled;
                btn.addEventListener('click', () => {
                    currentOffset = offset;
                    fetchImages();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                container.appendChild(btn);
            };

            addBtn('Prev', Math.max(0, currentOffset - perPage), currentPage === 0);

            const maxButtons = 7;
            let start = Math.max(0, currentPage - Math.floor(maxButtons / 2));
            let end = Math.min(totalPages, start + maxButtons);
            if (end - start < maxButtons) start = Math.max(0, end - maxButtons);

            for (let i = start; i < end; i++) {
                const btn = document.createElement('button');
                btn.textContent = i + 1;
                btn.style.background = i === currentPage ? '#e67e22' : '';
                btn.addEventListener('click', () => {
                    currentOffset = i * perPage;
                    fetchImages();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                container.appendChild(btn);
            }

            addBtn('Next', currentOffset + perPage, currentPage >= totalPages - 1);
        }

        // --- Facets ---

        function renderFacets() {
            const bar = document.getElementById('facetsBar');
            bar.innerHTML = '';

            // Group facets by type
            const groups = {};
            for (const f of lastFacets) {
                if (f.count === 0) continue;
                if (!groups[f.facet]) groups[f.facet] = [];
                groups[f.facet].push(f);
            }

            const facetLabels = {
                gameId: 'Game',
                category: 'Category'
            };

            // Only show gameId and category (type is always "image")
            for (const facetName of ['gameId', 'category']) {
                const items = groups[facetName];
                if (!items || items.length === 0) continue;

                const group = document.createElement('div');
                group.className = 'facet-group';

                const label = document.createElement('span');
                label.className = 'facet-group-label';
                label.textContent = facetLabels[facetName] || facetName;
                group.appendChild(label);

                const buttons = document.createElement('div');
                buttons.className = 'facet-buttons';

                for (const item of items) {
                    const btn = document.createElement('button');
                    btn.className = 'facet-btn';
                    if (activeFacets[facetName] === item.value) {
                        btn.classList.add('active');
                    }

                    const displayName = facetName === 'gameId'
                        ? gameIdToName(item.value)
                        : item.value;

                    btn.innerHTML = `${escapeHtml(displayName)}<span class="facet-count">${item.count.toLocaleString()}</span>`;

                    btn.addEventListener('click', () => toggleFacet(facetName, item.value));
                    buttons.appendChild(btn);
                }

                group.appendChild(buttons);
                bar.appendChild(group);
            }
        }

        function gameIdToName(id) {
            const game = allGames.find(g => String(g.id) === String(id));
            return game ? game.name : id;
        }

        function toggleFacet(facetName, value) {
            if (activeFacets[facetName] === value) {
                delete activeFacets[facetName];
            } else {
                activeFacets[facetName] = value;
            }
            currentOffset = 0;
            hideScrollSentinel();
            if (isInfiniteMode()) {
                fetchInfiniteInitial();
            } else {
                fetchImages();
            }
        }

        // --- Dispatch based on mode ---

        function performSearch() {
            currentOffset = 0;
            activeFacets = {};
            hideScrollSentinel();
            if (isInfiniteMode()) {
                fetchInfiniteInitial();
            } else {
                fetchImages();
            }
        }

        // --- Lightbox ---

        function openLightbox(img) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxInfo = document.getElementById('lightboxInfo');

            lightboxImg.src = img.url;
            lightboxImg.alt = img.caption || img.name;

            const date = new Date(img.createdAt).toLocaleDateString();

            lightboxInfo.innerHTML = `
                <strong>${escapeHtml(img.caption || img.name)}</strong><br>
                ${escapeHtml(img.game?.name || '')} &middot;
                by ${escapeHtml(img.owner?.name || 'Unknown')} &middot;
                ${date} &middot;
                ${img.views} views &middot;
                ${img.rating} rating
                ${img.description ? '<br>' + escapeHtml(img.description) : ''}
                <br><a href="${escapeHtml(img.url)}" target="_blank" rel="noopener">Full Image</a>
                ${img.siteUrl ? ` &middot; <a href="${escapeHtml(img.siteUrl)}" target="_blank" rel="noopener">View on Nexus Mods</a>` : ''}
            `;

            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.getElementById('lightboxImg').src = '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- Event listeners ---

        document.getElementById('searchBtn').addEventListener('click', performSearch);

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        document.getElementById('gameFilter').addEventListener('input', filterGameList);

        document.getElementById('gameSelect').addEventListener('change', performSearch);

        document.getElementById('modeSelect').addEventListener('change', performSearch);

        document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // Load games list then initial results
        loadGames().then(performSearch);
    </script>
</body>
</html>
